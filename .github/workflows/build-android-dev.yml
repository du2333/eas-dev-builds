name: Build Android Dev APK

on:
  workflow_dispatch:
    inputs:
      app_repo:
        description: "Expo app repository, in owner/repo format"
        required: true
        type: string
      ref:
        description: "Branch, tag, or commit SHA. Leave empty to use the default branch"
        required: false
        type: string
      app_path:
        description: "Path to the Expo app inside the repository"
        required: false
        default: "."
        type: string
      build_env:
        description: "Optional JSON object of build env vars"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Validate input
        shell: bash
        env:
          APP_REPO: ${{ inputs.app_repo }}
          APP_REF: ${{ inputs.ref }}
          APP_PATH: ${{ inputs.app_path }}
          BUILD_ENV: ${{ inputs.build_env }}
        run: |
          set -euo pipefail

          if [[ ! "$APP_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "app_repo must use owner/repo format."
            exit 1
          fi

          if [[ -n "$APP_REF" && ! "$APP_REF" =~ ^[A-Za-z0-9_./-]+$ ]]; then
            echo "ref must be a branch, tag, or commit SHA."
            exit 1
          fi

          if [[ -z "$APP_PATH" || "$APP_PATH" == /* || "$APP_PATH" == *..* || ! "$APP_PATH" =~ ^[A-Za-z0-9_./-]+$ ]]; then
            echo "app_path must be a relative path inside the repository."
            exit 1
          fi

          if [ -n "$BUILD_ENV" ]; then
            if ! echo "$BUILD_ENV" | jq -e 'type == "object" and all(keys[]; test("^[A-Za-z_][A-Za-z0-9_]*$")) and all(.[]; type == "string")' > /dev/null; then
              echo "build_env must be a JSON object with string values and valid environment variable names."
              exit 1
            fi
          fi

      - name: Checkout Expo app
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.app_repo }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.APP_REPO_READ_TOKEN }}
          persist-credentials: false

      - name: Validate app path
        shell: bash
        env:
          APP_PATH: ${{ inputs.app_path }}
        run: |
          set -euo pipefail

          if [ ! -d "$APP_PATH" ]; then
            echo "app_path does not exist: $APP_PATH"
            exit 1
          fi

          if [ ! -f "$APP_PATH/package.json" ]; then
            echo "app_path must contain package.json: $APP_PATH"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Setup Bun
        if: ${{ hashFiles('bun.lock') != '' }}
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [ -f bun.lockb ]; then
            echo "bun.lockb is not supported. Commit bun.lock instead."
            exit 1
          fi

          lockfiles=0
          [ -f bun.lock ] && lockfiles=$((lockfiles + 1))
          [ -f pnpm-lock.yaml ] && lockfiles=$((lockfiles + 1))
          [ -f yarn.lock ] && lockfiles=$((lockfiles + 1))
          [ -f package-lock.json ] && lockfiles=$((lockfiles + 1))

          if [ "$lockfiles" -ne 1 ]; then
            echo "Expected exactly one supported lockfile."
            exit 1
          fi

          if [ -f bun.lock ]; then
            bun ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable
          elif [ -f package-lock.json ]; then
            npm ci
          fi

      - name: Build Android debug APK
        shell: bash
        working-directory: ${{ inputs.app_path }}
        env:
          BUILD_ENV: ${{ inputs.build_env }}
        run: |
          set -euo pipefail

          if [ -n "$BUILD_ENV" ]; then
            while IFS= read -r entry; do
              key=$(echo "$entry" | jq -r '.key')
              value=$(echo "$entry" | jq -r '.value')
              export "$key=$value"
            done < <(echo "$BUILD_ENV" | jq -c 'to_entries[]')
          fi

          mkdir -p dist
          npx expo run:android \
            --device generic \
            --variant debug \
            --no-bundler \
            --output ./dist

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: android-dev-build
          path: ${{ inputs.app_path }}/dist/*.apk
          retention-days: 7
          compression-level: 0
